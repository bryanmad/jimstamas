<!doctype html>
<html>
    <head>
        <title>Horizontal Scroll Picker</title>
        <link rel="stylesheet" type="text/css" href="style-desktop.css" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap");
            body {
                padding: 30px;
            }
            h1 {
                font-family: ubuntu;
            }
            p {
                font-family: ubuntu;
                line-height: 30px;
            }
            button {
                font-family: ubuntu;
                color: white;
                background-color: black;
                border: none;
                padding: 10px;
                margin: 10px 0px;
                border-radius: 30px;
                cursor: pointer;
            }
            button:hover {
                font-family: ubuntu;
                color: white;
                background-color: #1e1e1e;
                border: none;
            }
            #scroller {
                height: 10vh; /*position: fixed;*/
                border: none;
                background-color: #00000010;
                border-radius: 30px;
                overflow-x: auto;
                overflow-y: hidden;
                scroll-snap-type: x mandatory;
                scroll-snap-stop: always;
            }
            #scroller::-webkit-scrollbar {
                display: none;
            }
            #scroller-block {
                overflow: visible;
                display: grid;
            }
            .numberInScroller {
                text-align: center;
                line-height: 8vh;
                height: 10vh;
                margin: 0px;
                padding-top: 10px;
                scroll-snap-align: center;
                font-size: 8vh;
            }
            #selectedValueIndicator {
                height: 12vh;
                color: blue;
                border-radius: 10vh;
                background-color: transparent;
                border: solid;
                border-width: 1px;
                border-color: #00000050;
                z-index: +1;
                position: relative;
                margin-top: -11vh;
                pointer-events: none;
                box-shadow: inset 0 0 10px #00000050;
            }
        </style>
    </head>
    <body>
        <h1 id="heading">
            Mobile-friendly Number Picker with Horizontal Scroll
        </h1>

        <p>
            A very flixible code snippet to help you set up a horizontal
            scrolling number picker. Easily set up custom start number and an
            end number, width of the scroller, color scheme, etc.<br />Slide
            horizontally to pick a number:
        </p>

        <div id="scroller">
            <div id="scroller-block"></div>
        </div>

        <div id="selectedValueIndicator"></div>

        <button onclick="getScrollLeft()">Get Value</button>

        <p id="scrollValue"></p>
        <script type="text/javascript">
            // Developed by Ronak Laungani while he was in lock down during the
            //COVID-19 Pandemic. Imagine how bored he was. Show some love at
            //http://www.ronaklaungani.com. Thanks! // Change these variable values to
            //customize your scroller.
            var startNumber = 10;
            var endNumber = 50;
            var widthOfOneColumn = 90;
            var stepValue = 1;

            // Build the scrolling list.
            var totalNumbers = endNumber - startNumber + 2;
            const scrollerBlock = document.getElementById("scroller-block");
            scrollerBlock.style.gridTemplateColumns =
                "repeat(" + totalNumbers + ", " + widthOfOneColumn + "px)";
            scrollerBlock.style.paddingLeft = "" + widthOfOneColumn + "px";
            // Setting the width of the scroller block.
            const scroller = document.getElementById("scroller");
            scroller.style.width = "" + 3 * widthOfOneColumn + "px";
            // Position the circular indicator.
            const selectedValueIndicator = document.getElementById(
                "selectedValueIndicator",
            );
            selectedValueIndicator.style.width = "" + widthOfOneColumn + "px";
            selectedValueIndicator.style.marginLeft =
                "" + widthOfOneColumn + "px";
            // Fill value to the scrolling list.
            var z = startNumber;
            while (z < endNumber + stepValue + 1) {
                const listItem = document.createElement("p");
                listItem.className = "numberInScroller";
                listItem.style.width = "" + widthOfOneColumn + "px";
                listItem.innerHTML = "" + z + "";
                if (z > endNumber) {
                    listItem.style.opacity = "0%";
                }
                scrollerBlock.append(listItem);
                z = z + stepValue;
            }
            // Capture and printing the value at the centre.
            const printvalue = document.getElementById("scrollValue");

            function getScrollLeft() {
                const finalValue =
                    (scroller.scrollLeft / widthOfOneColumn) * stepValue +
                    startNumber;
                printvalue.innerHTML = "" + finalValue + "";
                console.log(finalValue);
            }
        </script>
    </body>
</html>
